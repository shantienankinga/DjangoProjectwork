{% extends "./base.html" %}
{% load crispy_forms_tags %}
{% block content %}
    <h1>Add-category</h1>
        <form method="POST">
            {% csrf_token %}
            {{ form|crispy }}
            <input type="submit" class = "btn btn-success">
        </form>
        {% if msg %}
           {{ msg }}
        {% endif %}
    <table class="table table-striped">
        <thead>
            <tr>
                <th scope = "col">id </th>  
                <th scope = "col">Name </th>
            <tr>
        </thead>
        <tbody>
            {% for category in categorys %}
            <tr>
                <th scope = "row">{{category.id}}</th>
                <td> {{category.name}} </td>
                <td> 
                    <a href ="{% url 'edit_category_page' category.id %}">Edit</a>
                    <a href = "{% url 'delete_category_page' category.id %}" 
                        onclick ="return confirm('Are you sure you want to delete')">Delete
                    </a>
                </td>
            <tr>
            {% endfor %}
    </table>
{% endblock content %}
