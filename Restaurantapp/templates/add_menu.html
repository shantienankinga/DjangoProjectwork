{% extends "./base.html" %}
{% load crispy_forms_tags %}
{% block content %}
    
       <h1>Menu</h1> 
           <form method="POST">
                  {% csrf_token %}
                  {{form|crispy}}
                  <input type="submit" class="btn btn-success">
           </form> 
           {% if msg %}
               {{msg}}
           {% endif %}
        <table class = "table, table-striped">
            <thead>
                <tr>
                    <th scope = "col">menu_name</th>
                    <th scope = "col">price</th>
                    
                <tr>
            </thead>
             <tbody>
                {% for menu in menus %}
                    <tr>
                        <th scope = "row">{{menu.id}}</th>
                        <td> {{menu.menu_name}} </td>
                        <td> {{menu.price}} </td>
                        <td>
                            <a href = "{% url 'edit_menu_page' menu.id %}" >Edit </a>
                            <a href = "  {% url 'delete_menu_page' menu.id %}" 
                               onclick ="return confirm('Are you sure you want to delete')">Delete
                            </a>
                        </td>

                    <tr>
                {% endfor %}
            </tbody>
        </table>
        
            
       <a href ="{% url 'home_page'%} " >home_page</a>
{% endblock content %}
